[workspace]
authors = ["Allen Guo <guosonglin001@gmail.com>"]
channels = ["conda-forge"]
name = "paper-xyz"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[tasks]

# default
[dependencies]
python = ">=3.14.5,<3.15"
uv = ">=0.11.19,<0.12"
ruff = ">=0.15.15,<0.16"
ty = ">=0.0.43,<0.0.44"
pre-commit = ">=4.6.0,<5"
hatchling = ">=1.30.1,<2"

ripgrep = ">=15.1.0,<16"
fzf = ">=0.73.1,<0.74"
fd-find = ">=10.4.2,<11"
difftastic = ">=0.69.0,<0.70"
zellij = ">=0.44.3,<0.45"

pytorch = ">=2.10.0,<3"
torchvision = ">=0.26.0,<0.27"
openai = ">=2.41.0,<3"
websocket-client = ">=1.9.0,<2"

# may needs a latest version, check `activation.env`
"llama.cpp" = ">=9222,<9223"
poppler = ">=26.5.0,<27"
pandoc = ">=3.9.0.2,<4"

[pypi-dependencies]
# `src/paper_xyz`
paper_xyz = { path = ".", editable = true }
requests = ">=2.34.2, <3"
ty-extensions = ">=0.1.0, <0.2"
# https://github.com/py-pdf/pypdf
pypdf = ">=6.12.2, <7"
# https://github.com/pymupdf/PyMuPDF
pymupdf = ">=1.27.2.3, <2"
# https://github.com/pymupdf/pymupdf4llm
pymupdf4llm = ">=0.3.4, <2"
# https://github.com/allenai/olmocr
olmocr = ">=0.4.27, <0.5"
rich = ">=13.9.4, <14"

# docling
[feature.docling.dependencies]
python = ">=3.13.13,<3.14"
# https://github.com/docling-project/docling
docling = ">=2.95.0,<3"
pymupdf = ">=1.27.2.2,<2"

# markitdown
[feature.markitdown.dependencies]
python = ">=3.14.5,<3.15"

[feature.markitdown.pypi-dependencies]
# https://github.com/microsoft/markitdown
# pixi add --pypi 'markitdown[pdf]' -f markitdown
markitdown = { version = ">=0.0.2, <0.2", extras = ["pdf"] }

# # marker
# [feature.marker.dependencies]
# python = "3.13.*"

# [feature.marker.pypi-dependencies]
# # https://github.com/datalab-to/marker
# marker-pdf = ">=1.10.2, <2"
# # https://github.com/datalab-to/surya
# surya-ocr = ">=0.17.1, <0.18"

# # mlx
# [feature.mlx.system-requirements]
# macos = "16.0"

# [feature.mlx.dependencies]
# python = "3.13.*"
# mlx = ">=0.30.6,<0.31"
# mlx-lm = ">=0.30.7,<0.31"
# mlx-vlm = ">=0.3.12,<0.4"
# torchvision = ">=0.25.0,<0.26"

# # ollama
# [feature.ollama.dependencies]
# ollama = ">=0.17.0,<0.18"

[environments]
# default is implicit
docling = { features = ["docling"], no-default-feature = true }
markitdown = { features = ["markitdown"], no-default-feature = true }
# marker = { features = ["marker"], no-default-feature = true }
# mlx = { features = ["mlx"], no-default-feature = true }
# ollama = { features = ["ollama"], no-default-feature = true }

# TODO: add MinerU
# https://github.com/opendatalab/MinerU

[activation.env]
# https://github.com/ggml-org/llama.cpp/releases
PATH = "${PIXI_PROJECT_ROOT}/debug_agent/llama:${PATH}"
# for cuda devices
# CUDA_VISIBLE_DEVICES = "0"
# CUDA_DEVICE_ORDER = "PCI_BUS_ID"
